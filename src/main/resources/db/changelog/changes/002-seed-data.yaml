        # Fix Postgres Sequences
        - sql:
            dbms: postgresql
            splitStatements: true
            sql: |
              DO $$ 
              BEGIN
                EXECUTE 'ALTER SEQUENCE lecturers_id_seq RESTART WITH ' || (SELECT COALESCE(MAX(id), 0) + 1 FROM lecturers);
                EXECUTE 'ALTER SEQUENCE students_id_seq RESTART WITH ' || (SELECT COALESCE(MAX(id), 0) + 1 FROM students);
                EXECUTE 'ALTER SEQUENCE courses_id_seq RESTART WITH ' || (SELECT COALESCE(MAX(id), 0) + 1 FROM courses);
                EXECUTE 'ALTER SEQUENCE departments_id_seq RESTART WITH ' || (SELECT COALESCE(MAX(id), 0) + 1 FROM departments);
                EXECUTE 'ALTER SEQUENCE degrees_id_seq RESTART WITH ' || (SELECT COALESCE(MAX(id), 0) + 1 FROM degrees);
              END $$;
